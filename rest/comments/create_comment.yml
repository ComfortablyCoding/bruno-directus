info:
  name: create_comment
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/comments"
  body:
    type: json
    data: |-
      {
        "collection": "articles",
        "item": "item-id",
        "comment": "This looks great!"
      }
  auth: inherit

settings:
  encodeUrl: true

docs: |-
  Create a new comment on an item.
  https://directus.io/docs/api/comments
