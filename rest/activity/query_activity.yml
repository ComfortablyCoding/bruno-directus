info:
  name: query_activity
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/activity"
  params:
    - name: fields
      value: "id,action,user,timestamp,collection,item"
      type: query
      disabled: true
    - name: filter
      value: '{"status":{"_eq":"published"}}'
      type: query
      disabled: true
    - name: sort
      value: "-timestamp"
      type: query
      disabled: true
    - name: limit
      value: "10"
      type: query
      disabled: true
    - name: offset
      value: "0"
      type: query
      disabled: true
    - name: search
      value: "keyword"
      type: query
      disabled: true
    - name: meta
      value: "total_count,filter_count"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true

docs: |-
  Retrieve a list of all activity records in the system.
  https://directus.io/docs/api/activity
