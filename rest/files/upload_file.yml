info:
  name: upload_file
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/files"
  body:
    type: multipart-form
    data:
      - name: file
        value: "@file(path/to/file.jpg)"
  auth: inherit

settings:
  encodeUrl: true

docs: |-
  Upload a file to Directus using multipart form data.
  https://directus.io/docs/api/files
