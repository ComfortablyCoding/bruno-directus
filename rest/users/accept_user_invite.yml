info:
  name: accept_user_invite
  type: http
  seq: 12

http:
  method: POST
  url: "{{base_url}}/users/invite/accept"
  body:
    type: json
    data: |-
      {
        "token": "invite-token",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true

docs: |-
  Accept a user invitation using the token from the invite email and set a password.
  https://directus.io/docs/api/users
