info:
  name: refresh_token
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refresh_token": "your-refresh-token"
      }
  auth: inherit

settings:
  encodeUrl: true

docs: |-
  Exchange a refresh token for a new access token.
  https://directus.io/docs/api/authentication
