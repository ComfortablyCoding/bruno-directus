opencollection: 1.0.0

info:
  name: directus
bundled: false

request:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getEnvVar('access_token');
        const mode = req.getAuthMode();
        const url = req.getUrl();
        const isWs = req.getType?.() === 'websocket' || url.includes('/websocket');
        const isAuthRoute = /\/auth\/(login|refresh)/.test(url);

        if (token && mode !== 'inherit' && !isWs && !isAuthRoute) {
          req.setHeader('Authorization', `Bearer ${token}`);
        }

extensions:
  bruno:
    ignore:
      - .git
      - .gitignore
      - package.json
      - .oxfmtrc.json
      - node_modules
      - pnpm-lock.yaml
