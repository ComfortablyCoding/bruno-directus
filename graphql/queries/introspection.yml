info:
  name: introspection
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{base_url}}/graphql"
  auth: inherit
  body:
    query: |-
      query IntrospectionQuery {
        __schema {
          types {
            name
            kind
            fields {
              name
              type {
                name
                kind
              }
            }
          }
        }
      }

settings:
  encodeUrl: true

docs: |-
  Introspect the GraphQL schema to discover available types and fields.
  https://directus.io/docs/api/graphql
